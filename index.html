<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#f9e000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RONGOE" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />

    <title>RONGOE — Gloryboyz FC</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const base = "%BASE_URL%";
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });

          navigator.serviceWorker.register(base + "sw.js", { scope: base }).then(reg => {
            const triggerUpdate = () => reg.update();

            // Force update check on each app launch.
            triggerUpdate();

            // Check periodically while app is open.
            setInterval(triggerUpdate, 60 * 1000);

            // If a new worker is waiting, activate immediately.
            if (reg.waiting) {
              reg.waiting.postMessage({ type: "SKIP_WAITING" });
            }
            reg.addEventListener('updatefound', () => {
              const installing = reg.installing;
              if (!installing) return;
              installing.addEventListener('statechange', () => {
                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                  reg.waiting?.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
          });
        });
      }
    </script>
  </body>
</html>
