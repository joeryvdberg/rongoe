name: Sync Competition Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync competition feed
        run: node scripts/sync-competition.mjs

      - name: Commit updated feed
        run: |
          if git diff --quiet -- public/competition-live.json; then
            echo "No competition changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/competition-live.json
          git commit -m "Sync competition data feed"
          git push
